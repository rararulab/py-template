name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write   # required for PyPI Trusted Publishing

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  validate:
    name: Validate tag
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check version tag matches pyproject
        run: |
          python scripts/check_version_tag.py \
            --pyproject pyproject.toml \
            --expected-version "${{ needs.release-please.outputs.tag_name }}"

  build-and-publish:
    name: Build + attach assets (+ optional PyPI publish)
    needs: [release-please, validate]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: ./.github/actions/setup-python-env
      - name: Build distributions
        run: uvx --from build pyproject-build --installer uv
      - name: Generate sha256 sums
        run: |
          set -euxo pipefail
          cd dist
          for f in *.tar.gz *.whl; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done
      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber

      # Uncomment after configuring PyPI Trusted Publishing for this repo:
      # https://docs.pypi.org/trusted-publishers/
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: dist/
      #     skip-existing: true
