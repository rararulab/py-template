name: Setup Python env
description: Install uv, the requested Python version, and `uv sync` the dev group.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}
    - name: Install dependencies
      shell: bash
      run: uv sync --all-groups
