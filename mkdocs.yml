site_name: __PROJECT_NAME__
site_description: "__PROJECT_DESCRIPTION__"
site_author: __AUTHOR_NAME__
site_url: https://__GITHUB_ORG__.github.io/__PROJECT_NAME__/
repo_url: https://github.com/__GITHUB_ORG__/__PROJECT_NAME__
repo_name: __GITHUB_ORG__/__PROJECT_NAME__
edit_uri: edit/main/docs/

docs_dir: docs

nav:
  - Home: index.md
  - User Guide:
      - Install: guide/install.md
      - Usage: guide/usage.md
  - Development:
      - Contributing: dev/contributing.md
      - Release: dev/release.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/__pkg__"]

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/__GITHUB_ORG__/__PROJECT_NAME__
