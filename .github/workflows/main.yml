name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_COLOR: "1"
  TERM: dumb

jobs:
  check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (mypy strict)
        run: uv run mypy --strict
      - name: Type check (pyright — pylance parity)
        run: uv run pyright
      - name: Lock file up to date
        run: uv lock --locked

  tests:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run python -m pytest --cov --cov-report=xml --cov-report=term
      - name: Enforce per-module coverage gates
        run: uv run python scripts/check_coverage.py --xml coverage.xml
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  build-wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [check, tests]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
      - name: Build distributions
        run: uvx --from build pyproject-build --installer uv
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
